apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: job-portal
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'auth-service'
        static_configs:
          - targets: ['auth-service:5000']
            labels:
              service: 'auth'

      - job_name: 'utils-service'
        static_configs:
          - targets: ['utils-service:5001']
            labels:
              service: 'utils'

      - job_name: 'user-service'
        static_configs:
          - targets: ['user-service:5002']
            labels:
              service: 'user'

      - job_name: 'job-service'
        static_configs:
          - targets: ['job-service:5003']
            labels:
              service: 'job'

      - job_name: 'payment-service'
        static_configs:
          - targets: ['payment-service:5004']
            labels:
              service: 'payment'

      - job_name: 'interview-service'
        static_configs:
          - targets: ['interview-service:5005']
            labels:
              service: 'interview'

      - job_name: 'ml-service'
        static_configs:
          - targets: ['ml-service:8000']
            labels:
              service: 'ml'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: job-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: storage
          mountPath: /prometheus
        args:
          - '--config.file=/etc/prometheus/prometheus.yml'
          - '--storage.tsdb.path=/prometheus'
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: job-portal
spec:
  selector:
    app: prometheus
  ports:
  - protocol: TCP
    port: 9090
    targetPort: 9090
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: job-portal
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: job-portal
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'Default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
---
