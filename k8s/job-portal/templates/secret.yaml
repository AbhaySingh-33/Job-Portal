apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
stringData:
  # --- Database (Neon) ---
  DB_URL: {{ .Values.secrets.dbUrl | quote }}
  DATABASE_URL: {{ .Values.secrets.dbUrl | quote }} # For Python/Prisma compatibility
  
  # --- Redis (Upstash) ---
  UPSTASH_REDIS_REST_URL: {{ .Values.secrets.upstashRedisRestUrl | quote }}
  UPSTASH_REDIS_REST_TOKEN: {{ .Values.secrets.upstashRedisRestToken | quote }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  
  # --- Kafka (Aiven) ---
  KAFKA_BROKER: {{ .Values.secrets.kafkaBroker | quote }}
  KAFKA_USERNAME: {{ .Values.secrets.kafkaUsername | quote }}
  KAFKA_PASSWORD: {{ .Values.secrets.kafkaPassword | quote }}
  
  # --- Auth ---
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  JWT_REFRESH_SECRET: {{ .Values.secrets.jwtRefreshSecret | quote }}
  
  # --- Third Party Services ---
  CLOUD_NAME: {{ .Values.secrets.cloudinaryCloudName | quote }}
  API_KEY: {{ .Values.secrets.cloudinaryApiKey | quote }}
  API_SECRET: {{ .Values.secrets.cloudinaryApiSecret | quote }}
  
  RAZORPAY_KEY_ID: {{ .Values.secrets.razorpayKeyId | quote }}
  RAZORPAY_KEY_SECRET: {{ .Values.secrets.razorpayKeySecret | quote }}
  
  API_KEY_GEMINI: {{ .Values.secrets.googleAiKey | quote }}
  GOOGLE_GENERATIVE_AI_API_KEY: {{ .Values.secrets.googleAiKey | quote }}
  INTERVIEW_BIG_GEMINI_KEY: {{ .Values.secrets.interviewGoogleAiKey | quote }}
  
  SMTP_HOST: {{ .Values.secrets.smtpHost | quote }}
  SMTP_PORT: {{ .Values.secrets.smtpPort | quote }}
  SMTP_USER: {{ .Values.secrets.smtpUser | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPass | quote }}
  
  NEXT_PUBLIC_VAPI_WEB_TOKEN: {{ .Values.secrets.vapiToken | quote }}
  NEXT_PUBLIC_DEEPGRAM_API_KEY: {{ .Values.secrets.deepgramKey | quote }}
