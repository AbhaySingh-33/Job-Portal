apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  annotations:
    # Rewrite target removed to pass full path to backend
    nginx.ingress.kubernetes.io/proxy-body-size: "50m" # For file uploads
spec:
  rules:
    - http:
        paths:
          # Auth Service
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.auth.name }}
                port:
                  number: {{ .Values.auth.service.port }}


          # User Service
          - path: /api/user
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.user.name }}
                port:
                  number: {{ .Values.user.service.port }}

          # Job Service
          - path: /api/job
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.job.name }}
                port:
                  number: {{ .Values.job.service.port }}


          # Payment Service
          - path: /api/payment
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.payment.name }}
                port:
                  number: {{ .Values.payment.service.port }}

          # Interview Service
          - path: /api/interview
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.interview.name }}
                port:
                  number: {{ .Values.interview.service.port }}

          # Utils Service
          - path: /api/utils
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.utils.name }}
                port:
                  number: {{ .Values.utils.service.port }}

          # ML Service
          - path: /recommend
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ml.name }}
                port:
                  number: {{ .Values.ml.service.port }}

          {{- if .Values.monitoring.enabled }}
          # Prometheus
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.monitoring.prometheus.name }}
                port:
                  number: {{ .Values.monitoring.prometheus.service.port }}

          # Grafana
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.monitoring.grafana.name }}
                port:
                  number: {{ .Values.monitoring.grafana.service.port }}
          {{- end }}

          # Frontend (Root)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.frontend.name }}
                port:
                  number: {{ .Values.frontend.service.port }}
