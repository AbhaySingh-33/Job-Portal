{{- if .Values.ml.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress-ml
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
    - http:
        paths:
          - path: /api/ml(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ .Values.ml.name }}
                port:
                  number: {{ .Values.ml.service.port }}
{{- end }}
